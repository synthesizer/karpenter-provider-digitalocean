name: Integration Tests

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      test_suite:
        description: "Test suite to run"
        required: false
        default: "integration"
        type: choice
        options:
          - integration
          - e2e
          - all
      region:
        description: "DigitalOcean region for the test cluster"
        required: false
        default: "nyc1"
        type: string
      node_size:
        description: "Droplet size for the test cluster nodes"
        required: false
        default: "s-2vcpu-4gb"
        type: string
      k8s_version:
        description: "Kubernetes version (e.g. '1.31' or 'latest')"
        required: false
        default: "latest"
        type: string
  schedule:
    # Run integration tests nightly at 2am UTC
    - cron: "0 2 * * *"

permissions:
  contents: read
  packages: write   # needed for GHCR push (fallback)

env:
  GO_VERSION: "1.24"
  CLUSTER_NAME: karpenter-do-ci-${{ github.run_id }}
  DO_REGION: ${{ github.event.inputs.region || 'nyc1' }}
  NODE_SIZE: ${{ github.event.inputs.node_size || 's-2vcpu-4gb' }}
  K8S_VERSION: ${{ github.event.inputs.k8s_version || 'latest' }}

jobs:
  # -------------------------------------------------------------------
  # Create a fresh DOKS cluster for the test run
  # -------------------------------------------------------------------
  create-cluster:
    name: Create DOKS Cluster
    # Only run for schedule/dispatch, or when the PR label is "integration_test"
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'integration_test')
    runs-on: ubuntu-latest
    environment: integration
    outputs:
      cluster_id: ${{ steps.create.outputs.cluster_id }}
      cluster_name: ${{ steps.create.outputs.cluster_name }}
    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}" ]; then
            echo "::error::DIGITALOCEAN_ACCESS_TOKEN secret is not set. Configure it in the 'integration' environment."
            exit 1
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Resolve Kubernetes version
        id: k8s_version
        run: |
          if [ "${{ env.K8S_VERSION }}" = "latest" ]; then
            VERSION=$(doctl kubernetes options versions -o json | jq -r '.[0].slug')
          else
            VERSION=$(doctl kubernetes options versions -o json | jq -r --arg v "${{ env.K8S_VERSION }}" '[.[] | select(.slug | startswith($v))][0].slug')
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Could not resolve Kubernetes version '${{ env.K8S_VERSION }}'"
            doctl kubernetes options versions
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved Kubernetes version: $VERSION"

      - name: Create DOKS cluster
        id: create
        run: |
          echo "Creating cluster ${{ env.CLUSTER_NAME }} in ${{ env.DO_REGION }}..."
          doctl kubernetes cluster create "${{ env.CLUSTER_NAME }}" \
            --region "${{ env.DO_REGION }}" \
            --version "${{ steps.k8s_version.outputs.version }}" \
            --node-pool "name=default;size=${{ env.NODE_SIZE }};count=2" \
            --wait \
            --output json | tee /tmp/cluster.json

          CLUSTER_ID=$(jq -r '.[0].id' /tmp/cluster.json)
          echo "cluster_id=$CLUSTER_ID" >> "$GITHUB_OUTPUT"
          echo "cluster_name=${{ env.CLUSTER_NAME }}" >> "$GITHUB_OUTPUT"
          echo "Cluster created: $CLUSTER_ID"

      - name: Wait for cluster to be running
        run: |
          echo "Waiting for cluster nodes to be ready..."
          doctl kubernetes cluster kubeconfig save "${{ env.CLUSTER_NAME }}"
          for i in $(seq 1 30); do
            READY=$(kubectl get nodes --no-headers 2>/dev/null | grep -c " Ready " || true)
            echo "  Attempt $i: $READY nodes ready"
            if [ "$READY" -ge 2 ]; then
              echo "All nodes ready."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for nodes to become ready"
          kubectl get nodes
          exit 1

  # -------------------------------------------------------------------
  # Integration tests (unit-style tests against live DO API)
  # -------------------------------------------------------------------
  integration:
    name: Integration Tests
    needs: create-cluster
    if: github.event.inputs.test_suite != 'e2e'
    runs-on: ubuntu-latest
    environment: integration
    env:
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      DO_CLUSTER_ID: ${{ needs.create-cluster.outputs.cluster_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: |
          doctl kubernetes cluster kubeconfig save "${{ needs.create-cluster.outputs.cluster_name }}"

      - name: Run integration tests
        run: |
          go test ./test/suites/integration/... -v -count=1 -timeout 30m
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          DO_CLUSTER_ID: ${{ needs.create-cluster.outputs.cluster_id }}
          DO_REGION: ${{ env.DO_REGION }}
          CLUSTER_NAME: ${{ needs.create-cluster.outputs.cluster_name }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            **/test-results.xml
            **/test-output.log

  # -------------------------------------------------------------------
  # E2E tests (deploy Karpenter into the cluster and exercise it)
  # -------------------------------------------------------------------
  e2e:
    name: E2E Tests
    needs: create-cluster
    if: github.event.inputs.test_suite == 'e2e' || github.event.inputs.test_suite == 'all' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    environment: integration
    env:
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      DO_CLUSTER_ID: ${{ needs.create-cluster.outputs.cluster_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl
        run: |
          doctl kubernetes cluster kubeconfig save "${{ needs.create-cluster.outputs.cluster_name }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      # ── Build and push controller image to DOCR ──────────────────────
      - name: Create DOCR registry
        run: |
          # Create registry if it doesn't already exist (starter tier = 500 MB free).
          doctl registry create karpenter-ci --subscription-tier starter 2>/dev/null || true
          echo "DOCR registry ready"

      - name: Clean up stale DOCR images
        run: |
          # Starter tier allows only 1 repository. Remove old tags and run GC
          # so a prior run's leftovers don't block our push.
          for repo in $(doctl registry repository list-v2 --format Name --no-header 2>/dev/null || true); do
            echo "Cleaning repository: $repo"
            for tag in $(doctl registry repository list-tags "$repo" --format Tag --no-header 2>/dev/null || true); do
              echo "  Deleting tag: $tag"
              doctl registry repository delete-tag "$repo" "$tag" --force 2>/dev/null || true
            done
          done
          # Start garbage collection to reclaim space and free repo slots.
          doctl registry garbage-collection start --force 2>/dev/null || true
          # Give GC a moment to process.
          sleep 10
          echo "DOCR cleanup done"

      - name: Login to DOCR
        run: doctl registry login

      - name: Build and push controller image
        id: build
        run: |
          IMAGE="registry.digitalocean.com/karpenter-ci/karpenter-do:ci-${{ github.run_id }}"
          docker build -t "$IMAGE" .
          # Retry push up to 3 times — DOCR starter tier can be slow to reclaim repo slots.
          for attempt in 1 2 3; do
            if docker push "$IMAGE" 2>&1; then
              echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
              echo "Pushed $IMAGE (attempt $attempt)"
              exit 0
            fi
            echo "Push attempt $attempt failed, waiting for DOCR GC to finish..."
            doctl registry garbage-collection start --force 2>/dev/null || true
            sleep 30
          done
          echo "::error::Failed to push image after 3 attempts"
          exit 1

      - name: Connect DOCR to DOKS cluster
        run: |
          doctl kubernetes cluster registry add "${{ needs.create-cluster.outputs.cluster_name }}" || true

      # ── Install CRDs ─────────────────────────────────────────────────
      - name: Install Karpenter core CRDs
        run: |
          echo "Installing NodePool and NodeClaim CRDs..."
          kubectl apply --server-side -f config/crd/

      - name: Install DONodeClass CRD
        run: |
          helm template karpenter-do charts/karpenter-do \
            --show-only templates/crd-donodeclass.yaml | kubectl apply --server-side -f -

      # ── Resolve cluster info ─────────────────────────────────────────
      - name: Resolve cluster info
        id: cluster_info
        run: |
          CLUSTER_JSON=$(doctl kubernetes cluster get "${{ needs.create-cluster.outputs.cluster_id }}" -o json)
          ENDPOINT=$(echo "$CLUSTER_JSON" | jq -r '.[0].endpoint')
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "Endpoint: $ENDPOINT"

      # ── Deploy Karpenter controller via Helm ─────────────────────────
      - name: Deploy Karpenter controller
        run: |
          # Create namespace if needed
          kubectl create namespace kube-system 2>/dev/null || true

          helm upgrade --install karpenter-do charts/karpenter-do \
            --namespace kube-system \
            --set image.repository=registry.digitalocean.com/karpenter-ci/karpenter-do \
            --set image.tag=ci-${{ github.run_id }} \
            --set image.pullPolicy=Always \
            --set replicaCount=1 \
            --set settings.clusterName=${{ needs.create-cluster.outputs.cluster_name }} \
            --set settings.clusterEndpoint=${{ steps.cluster_info.outputs.endpoint }} \
            --set settings.clusterID=${{ needs.create-cluster.outputs.cluster_id }} \
            --set settings.clusterRegion=${{ env.DO_REGION }} \
            --set digitalocean.accessToken=${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }} \
            --wait --timeout 5m

      - name: Wait for controller to be ready
        run: |
          echo "Waiting for Karpenter controller rollout..."
          kubectl -n kube-system rollout status deployment/karpenter-do --timeout=300s
          echo "Controller pods:"
          kubectl -n kube-system get pods -l app.kubernetes.io/name=karpenter-do -o wide

      # ── Run E2E tests ────────────────────────────────────────────────
      - name: Run e2e tests
        run: |
          go test ./test/suites/e2e/... -v -count=1 -timeout 60m
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          DO_CLUSTER_ID: ${{ needs.create-cluster.outputs.cluster_id }}
          DO_REGION: ${{ env.DO_REGION }}
          CLUSTER_NAME: ${{ needs.create-cluster.outputs.cluster_name }}
          CLUSTER_ENDPOINT: ${{ steps.cluster_info.outputs.endpoint }}

      # ── Diagnostics on failure ───────────────────────────────────────
      - name: Collect cluster diagnostics
        if: failure()
        run: |
          echo "=== Nodes ==="
          kubectl get nodes -o wide || true
          echo ""
          echo "=== NodeClaims ==="
          kubectl get nodeclaims -o wide 2>/dev/null || echo "(none)"
          echo ""
          echo "=== DONodeClasses ==="
          kubectl get donodeclasses -o wide 2>/dev/null || echo "(none)"
          echo ""
          echo "=== NodePools ==="
          kubectl get nodepools -o wide 2>/dev/null || echo "(none)"
          echo ""
          echo "=== Karpenter controller logs (last 300 lines) ==="
          kubectl logs -n kube-system -l app.kubernetes.io/name=karpenter-do --tail=300 || true
          echo ""
          echo "=== Karpenter controller describe ==="
          kubectl describe deployment -n kube-system karpenter-do || true
          echo ""
          echo "=== Events ==="
          kubectl get events --sort-by='.lastTimestamp' -A | tail -50 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            **/test-results.xml
            **/test-output.log

  # -------------------------------------------------------------------
  # Always delete the cluster and clean up resources
  # -------------------------------------------------------------------
  delete-cluster:
    name: Delete DOKS Cluster
    needs: [create-cluster, integration, e2e]
    if: always() && needs.create-cluster.outputs.cluster_id != ''
    runs-on: ubuntu-latest
    environment: integration
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Delete cluster
        run: |
          echo "Deleting cluster ${{ needs.create-cluster.outputs.cluster_name }} (${{ needs.create-cluster.outputs.cluster_id }})..."
          doctl kubernetes cluster delete "${{ needs.create-cluster.outputs.cluster_id }}" \
            --force \
            --dangerous
          echo "Cluster deleted."

      - name: Clean up DOCR images
        run: |
          echo "Cleaning up CI image from DOCR..."
          doctl registry repository delete-tag karpenter-do ci-${{ github.run_id }} --force 2>/dev/null || true
          # Run garbage collection to reclaim storage
          doctl registry garbage-collection start --force 2>/dev/null || true
          echo "DOCR cleanup done."

      - name: Clean up associated resources
        run: |
          echo "Cleaning up volumes and load balancers tagged with the cluster..."
          # Delete any volumes that were created for the cluster
          doctl compute volume list --format ID,Name --no-header | \
            grep "${{ needs.create-cluster.outputs.cluster_name }}" | \
            awk '{print $1}' | \
            xargs -r -I {} doctl compute volume delete {} --force || true

          # Delete any load balancers tagged with the cluster
          doctl compute load-balancer list --format ID,Name --no-header | \
            grep "${{ needs.create-cluster.outputs.cluster_name }}" | \
            awk '{print $1}' | \
            xargs -r -I {} doctl compute load-balancer delete {} --force || true

          # Delete any Karpenter-managed droplets that might be orphaned
          doctl compute droplet list --tag-name karpenter-managed --format ID --no-header | \
            xargs -r -I {} doctl compute droplet delete {} --force || true

          echo "Cleanup complete."
